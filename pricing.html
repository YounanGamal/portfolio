<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="assets/YG.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Younan Gamal - Flexible Pricing Plans for Flutter & Front-End Development." />
    <title>Pricing | Younan Gamal</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Standalone page adjustments */
        .pricing-hero {
            padding-top: 80px;
            padding-bottom: 60px;
            text-align: center;
        }

        .back-home-wrap {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 24px;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-light);
            font-weight: 600;
            transition: transform 0.2s;
        }

        .back-home:hover {
            transform: translateX(-5px);
        }
    </style>
</head>

<body>

    <header class="pricing-hero" id="top">
        <div class="container">
            <div class="back-home-wrap">
                <a href="index.html" class="btn btn-outline back-home">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Home
                </a>
            </div>
            <div class="section-header">
                <span class="section-tag">Pricing Plans</span>
                <h1 class="section-title">Flexible <span class="highlight">Plans</span> for Your Vision</h1>
                <p class="section-sub">Transparent pricing to fit your project scope — from quick fixes to full-scale
                    apps.</p>
            </div>
        </div>
    </header>

    <!-- ========== PRICING SECTION ========== -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="pricing-grid">
                <!-- Cards injected here via pricing.js -->
            </div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <a href="index.html#home" class="nav-logo">
                    <span class="logo-bracket">&lt;</span>YG<span class="logo-bracket">/&gt;</span>
                </a>
                <p class="footer-copy">&copy; 2025 Younan Gamal &mdash; Crafted with ♥ &amp; Flutter passion.</p>
                <a href="#top" class="back-to-top" aria-label="Back to top">↑</a>
            </div>
        </div>
    </footer>

    <script src="pricing.js"></script>
</body>

</html>
